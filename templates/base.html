{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>{% block title %}SG Dividends Reports{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="{% static 'calendar/breakpoints.js' %}"></script>
  {% if GOATCOUNTER_SITE_CODE %}
  <script data-goatcounter="https://{{ GOATCOUNTER_SITE_CODE }}.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  {% endif %}
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="border-b bg-white">
    <nav class="mx-auto max-w-6xl flex flex-wrap items-center gap-4 px-4 py-3 text-sm">
      <a href="{% url 'landing' %}" class="font-semibold">SG Dividends Reports</a>
      <a href="{% url 'calendar_agm_egm' %}" class="hover:underline">AGM/EGM</a>
      <a href="{% url 'calendar_dividends' %}" class="hover:underline">Dividends</a>
      <a href="{% url 'calendar_acq_disposal' %}" class="hover:underline">Acquisitions/Disposals</a>
      <a href="{% url 'calendar_reports' %}" class="hover:underline">Reports</a>
      <a href="{% url 'calendar_other' %}" class="hover:underline">Other Announcements</a>
      <a href="{% url 'companies_list' %}" class="hover:underline">Companies List</a>
    </nav>
  </header>
  <main class="mx-auto max-w-6xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <footer class="mx-auto max-w-6xl px-4 py-6 text-xs text-slate-500">
    <a href="{% url 'about' %}" class="hover:underline">About</a> ·
    <a href="{% url 'disclaimer' %}" class="hover:underline">Disclaimer</a>
  </footer>
  <div id="detail-panel"></div>
</body>
</html>

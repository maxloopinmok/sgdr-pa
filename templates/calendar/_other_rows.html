{% for row in rows %}
<button type="button"
        class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm hover:bg-slate-50"
        hx-get="{% url 'event_detail' row.id %}"
        hx-target="#detail-panel"
        hx-swap="innerHTML">
  <time class="w-24 text-slate-500">{{ row.event_date|date:"D, d M" }}</time>
  <span class="w-40 truncate text-slate-600">{{ row.short_name }}</span>
  <span class="flex-1 truncate">{{ row.title }}</span>
  <span class="rounded border px-1.5 py-0.5 text-[10px] uppercase tracking-wide text-slate-500">SGX</span>
</button>
{% empty %}
<p class="px-4 py-8 text-center text-sm text-slate-500">
  {% if query %}No matches for &ldquo;{{ query }}&rdquo; in this window.
  {% else %}No announcements in this window.{% endif %}
</p>
{% endfor %}

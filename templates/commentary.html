{% extends "base.html" %}
{% block title %}Stocks Commentary — SG Dividends Reports{% endblock %}

{% block content %}
<section class="space-y-2">
  <div class="flex items-baseline gap-3">
    <h1 class="text-2xl font-semibold">Stocks Commentary</h1>
    <span class="text-xs text-slate-500">latest post</span>
    <a href="{{ blog_url }}" target="_blank" rel="noopener"
       class="ml-auto rounded border px-2 py-1 text-xs hover:bg-slate-100">All posts ↗</a>
  </div>
</section>

<article id="commentary-card" class="mt-6 bg-white rounded shadow-sm p-6">
  <div id="commentary-loading" class="text-sm text-slate-500">Loading latest post…</div>
  <div id="commentary-content" class="hidden"></div>
  <div id="commentary-error" class="hidden text-slate-700">
    Couldn't load the latest post just now. Please visit the blog directly:
    <a href="{{ blog_url }}" target="_blank" rel="noopener"
       class="text-slate-900 underline">{{ blog_url }}</a>
  </div>
</article>

<script>
// Blogger's JSON-P feed delivers a JSON payload wrapped in a callback.
// We register that callback before the <script> tag fetches the feed.
window.sgdrRenderLatestPost = function (json) {
  try {
    const feed = json && json.feed;
    const entries = feed && feed.entry;
    if (!entries || !entries.length) {
      showError();
      return;
    }
    const e = entries[0];
    const title = (e.title && e.title.$t) || "(untitled)";
    const contentHtml = (e.content && e.content.$t) || "";
    const publishedRaw = (e.published && e.published.$t) || "";
    let publishedLabel = "";
    if (publishedRaw) {
      const d = new Date(publishedRaw);
      if (!isNaN(d)) {
        publishedLabel = d.toLocaleDateString(undefined, {
          day: "numeric", month: "short", year: "numeric",
        });
      }
    }
    const alternate = (e.link || []).find(function (l) { return l.rel === "alternate"; });
    const postUrl = (alternate && alternate.href) || "";

    const titleHtml = postUrl
      ? '<a href="' + escapeAttr(postUrl) + '" target="_blank" rel="noopener" class="hover:underline">' + escapeText(title) + '</a>'
      : escapeText(title);

    const html =
      '<header class="mb-4 space-y-1">' +
        '<h2 class="text-xl font-semibold leading-tight">' + titleHtml + '</h2>' +
        (publishedLabel ? '<p class="text-xs text-slate-500">Published ' + escapeText(publishedLabel) + '</p>' : '') +
      '</header>' +
      '<div class="commentary-body max-w-none text-slate-800 leading-relaxed space-y-3">' + contentHtml + '</div>' +
      (postUrl
        ? '<footer class="mt-6 pt-4 border-t text-sm text-slate-500">Originally posted at <a href="' + escapeAttr(postUrl) + '" target="_blank" rel="noopener" class="text-slate-700 hover:underline">somethingusefulforinvestors.blogspot.com</a>.</footer>'
        : '');

    const target = document.getElementById("commentary-content");
    target.innerHTML = html;
    target.classList.remove("hidden");
    document.getElementById("commentary-loading").classList.add("hidden");
  } catch (err) {
    console.error("commentary render failed:", err);
    showError();
  }
};

function showError() {
  document.getElementById("commentary-loading").classList.add("hidden");
  document.getElementById("commentary-content").classList.add("hidden");
  document.getElementById("commentary-error").classList.remove("hidden");
}

// Only escape title + date — the post BODY is trusted HTML from Max's own
// blog and is intentionally inserted as-is so images, links, lists and
// formatting survive.
function escapeText(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c];
  });
}
function escapeAttr(s) { return escapeText(s); }

// Safety net: if the JSON-P script doesn't load within 8 s, show the
// fallback. Common causes: ad-blockers, network issues, Blogger 5xx.
setTimeout(function () {
  if (!document.getElementById("commentary-content").classList.contains("hidden")) return;
  showError();
}, 8000);
</script>
<script async
        src="{{ feed_jsonp_url }}"
        onerror="showError()"></script>

<style>
  /* Blogger's embedded HTML uses raw <p>, <img>, <ul>, etc. Tailwind's
     preflight strips default margins from these, so give the commentary
     body a light reset for readability without pulling in @tailwindcss/typography. */
  .commentary-body p { margin-bottom: 0.75rem; }
  .commentary-body p:last-child { margin-bottom: 0; }
  .commentary-body img { max-width: 100%; height: auto; margin: 0.75rem 0; }
  .commentary-body a { color: #1e40af; text-decoration: underline; }
  .commentary-body a:hover { color: #1e3a8a; }
  .commentary-body ul, .commentary-body ol { margin: 0.5rem 0 0.75rem 1.5rem; }
  .commentary-body ul { list-style: disc; }
  .commentary-body ol { list-style: decimal; }
  .commentary-body li { margin-bottom: 0.25rem; }
  .commentary-body h1, .commentary-body h2, .commentary-body h3,
  .commentary-body h4 { font-weight: 600; margin: 1rem 0 0.5rem; }
  .commentary-body h2 { font-size: 1.25rem; }
  .commentary-body h3 { font-size: 1.1rem; }
  .commentary-body blockquote {
    border-left: 3px solid #cbd5e1; padding-left: 0.75rem;
    color: #475569; margin: 0.75rem 0;
  }
  .commentary-body pre, .commentary-body code {
    background: #f1f5f9; border-radius: 4px; padding: 0.1rem 0.3rem;
    font-family: ui-monospace, SFMono-Regular, monospace;
  }
  .commentary-body pre { padding: 0.75rem; overflow-x: auto; }
  .commentary-body iframe { max-width: 100%; }
</style>
{% endblock %}
